# Builds the installable packages and attaches them to a GitHub Release:
#   • Android  → debug-signed .apk (sideloadable)
#   • macOS    → ad-hoc-signed PaliIME.app, zipped with ditto
#
# Runs automatically when a v* tag is pushed, or on demand (workflow_dispatch)
# against an existing release tag. The release must already exist.
name: Release packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach packages to'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Install Gradle 8.9 (matches AGP 8.5.2)
        run: |
          curl -sSL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q /tmp/gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.9/bin" >> "$GITHUB_PATH"
      - name: Build debug APK
        working-directory: desktop/android
        run: gradle :app:assembleDebug --no-daemon --stacktrace
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cp desktop/android/app/build/outputs/apk/debug/app-debug.apk "PaliIME-${TAG}.apk"
          gh release upload "$TAG" "PaliIME-${TAG}.apk" --clobber

  macos-app:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build PaliIME.app
        working-directory: desktop/macos
        run: ./build.sh
      - name: Package + upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          ditto -c -k --keepParent desktop/macos/build/PaliIME.app "PaliIME-macOS-${TAG}.zip"
          gh release upload "$TAG" "PaliIME-macOS-${TAG}.zip" --clobber

  keyman-kmp:
    name: Keyman package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Keyman .kmp (kmc, pure Node)
        working-directory: desktop/keyman
        run: |
          npm install -g @keymanapp/kmc@18.0.249
          for k in pali pali-deva pali-sinh pali-thai pali-mymr; do
            kmc --no-error-reporting build file "$k.kmn"
          done
          kmc --no-error-reporting build file pali.kps
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cp desktop/keyman/pali.kmp "PaliIME-keyman-${TAG}.kmp"
          gh release upload "$TAG" "PaliIME-keyman-${TAG}.kmp" --clobber
